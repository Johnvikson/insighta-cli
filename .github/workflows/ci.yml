name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: flake8 insighta/

      - name: Build check
        run: python -m build --no-isolation
